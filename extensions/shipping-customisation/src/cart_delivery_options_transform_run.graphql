query CartDeliveryOptionsTransformRunInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            metafield(namespace: "custom", key: "delivery_group") {
              value
            }
            highMarginFreeDeliveryMetafield: metafield(namespace: "custom", key: "high_margin_free_delivery") {
              value
            }
          }
        }
      }
    }
    deliveryGroups {
      cartLines {
        cost {
          subtotalAmount {
            amount
          }
        }
        merchandise {
          __typename
          ... on ProductVariant {
            product {
              metafield(namespace: "custom", key: "delivery_group") {
                value
              }
              highMarginFreeDeliveryMetafield: metafield(namespace: "custom", key: "high_margin_free_delivery") {
                value
              }
            }
          }
        }
      }
      deliveryAddress {
        countryCode
        zip
      }
      deliveryOptions {
        handle
        title
        cost {
          amount
        }
      }
    }
  }
}
